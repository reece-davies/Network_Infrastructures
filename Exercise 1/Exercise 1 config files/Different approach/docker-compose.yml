
version: "2"

services:
  ecommercesite1:
    image: nginx:latest
    restart: always
    volumes:
      - ./websites/container1:/usr/share/nginx/html/
    ports:
      - "5001:5000"

  ecommercesite2:
    image: nginx:latest
    restart: always
    volumes:
      - ./websites/container2:/usr/share/nginx/html/
    ports:
      - "5002:5000"

  ecommercesite3:
    image: nginx:latest
    restart: always
    volumes:
      - ./websites/container3:/usr/share/nginx/html/
    ports:
      - "5003:5000"

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ecommercesite1
      - ecommercesite2
      - ecommercesite3
    ports:
      - "8080:80"





